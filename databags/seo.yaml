# ──────────────────────────────────────────────────────────────
# SEO & robots configuration
# ──────────────────────────────────────────────────────────────
#
# Drives templates/robots.txt (Jinja template) and any other
# crawler-policy decisions. Edit this file to change crawler
# allowlists or sitemap-discovery without touching templates.
# ──────────────────────────────────────────────────────────────

# Deployment environment. The analytics-pixels macro
# (templates/macros/analytics-head.html) only fires when this is
# `production`, so local `lektor server` builds never inject
# retargeting/marketing pixels. Flip to `production` on deploy.
env: development

robots:
  # Per Phase-0 decision E-01: allow all AI/LLM crawlers.
  ai_crawler_policy: allow
  ai_crawlers:
    - GPTBot
    - ClaudeBot
    - PerplexityBot
    - Google-Extended
    - CCBot

  # Paths excluded from indexing. Applied to wildcard User-agent.
  # /certificate-share/ and /certificate-validate/ are backend-served
  # endpoints that carry attendee PII; bots are excluded by default but
  # social link-preview bots are explicitly re-allowed in
  # `social_link_preview_bots` so attendees can share their cert URL
  # on LinkedIn / X / Facebook / WhatsApp / Telegram and get a preview.
  disallow_paths:
    - /sponsoring/test.html
    - /landing-page-inactive/
    - /certificate-validate/
    - /certificate-share/

  # Per-bot Allow rules. Each entry produces its own User-agent block
  # in robots.txt above the wildcard block, so the named bots get
  # access to the listed paths regardless of the wildcard Disallow.
  social_link_preview_bots:
    - user_agent: LinkedInBot
      allow:
        - /certificate-share/
    - user_agent: Twitterbot
      allow:
        - /certificate-share/
    - user_agent: facebookexternalhit
      allow:
        - /certificate-share/
    - user_agent: WhatsApp
      allow:
        - /certificate-share/
    - user_agent: TelegramBot
      allow:
        - /certificate-share/

  # Sitemap URL announced in robots.txt. Lektor builds an absolute
  # path via canonical_host (see databags/branding.yaml).
  sitemap_path: /sitemap.xml

llms_txt:
  enabled: true                       # generate /llms.txt
  include_full_text: true             # additionally generate /llms-full.txt with talk abstracts

# Helper pages that should carry <meta name="robots" content="noindex">.
# Lektor templates check `this.url_path in bag('seo')['noindex_paths']`.
noindex_paths:
  - /sponsoring/test.html
  - /landing-page-inactive/
  - /certificate-validate/
  - /certificate-share/
