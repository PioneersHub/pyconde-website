  - id: are-tickets-refundable
    section: tickets
    question: Sind Tickets erstattungsfähig?
    answer: Tickets sind bis zum 27. März 2026 ohne Angabe von Gründen vollständig erstattungsfähig.
    display: true
    order: 4
  - id: tickets-payment
    section: tickets-payment-methods
    question: Welche Zahlungsoptionen werden angeboten?
    answer: |
      Akzeptierte Zahlungsmethoden:
      <ul>
      <li>
      Banküberweisung [bevorzugte Methode]</li><li>
      Kreditkarte (über Stripe)</li><li>
      PayPal</li>
      </ul>
      
      PayPal erhebt hohe Gebühren; daher bieten wir PayPal nur für Länder außerhalb des SEPA-Raums an.
      Innerhalb des SEPA-Raums (dem einheitlichen europäischen Zahlungsraum) wird eine einfache Banküberweisung empfohlen.
    display: true
    order: 5
  - id: tickets-by-invoice
    section: tickets
    question: Können Tickets per Rechnung und Banküberweisung bezahlt werden?
    answer: |
      Ja. Tickets können per **Rechnung** gekauft und per **Banküberweisung** über den Ticket-Shop bezahlt werden.

      Bitte die **Rechnung sofort nach dem Kauf herunterladen** und korrekt von der Buchhaltungs- oder Beschaffungsabteilung verarbeiten lassen.
      Alle Gelder müssen **innerhalb der angegebenen Zahlungsfrist** eingehen; unbezahlte Tickets werden automatisch storniert.
      **Konferenz-Tickets werden ausgestellt, sobald die Zahlung eingegangen ist.**

      Hinweis: Obwohl Verzögerungen in internen Beschaffungsprozessen vorkommen können, akzeptiert die Konferenz keine Zahlungsverzögerungen und stellt keine zusätzlichen Unterlagen, Lieferanten-Onboarding oder kundenspezifische Verarbeitung für Einkaufssysteme bereit.
      Falls dies nicht möglich ist, wird der Kauf per **Kreditkarte** empfohlen.
    display: true
    order: 6

