  - id: purchase-orders-for-tickets
    section: tickets
    question: Können Bestellungen für Tickets gesendet werden?
    answer: |
      Leider werden **Bestellungen nur von Sponsoren akzeptiert**.
      Alle anderen Tickets müssen direkt über den **Ticket-Shop** gekauft werden.

      Falls Tickets von einer anderen Abteilung gekauft werden müssen, bitte intern koordinieren, um die Transaktion über den Ticket-Shop abzuschließen.
      Per E-Mail oder Fax gesendete Bestellungen **werden nicht bearbeitet**.
      Beschaffungsbasierter Einkauf ist **ausschließlich für Sponsoren** verfügbar.
    display: true
    order: 5
  - id: what-about-food-drinks-during-the-conference
    section: tickets
    question: Was ist bei Essen und Getränken während der Konferenz inbegriffen?
    answer: |
      Das Konferenz-Ticket beinhaltet ein leichtes Lunch-Buffet, Kaffeepausen und leichte Erfrischungen über den Tag verteilt.
    display: true
    order: 6
  - id: food-options-at-the-conference
    section: tickets
    question: Welche Essensoptionen gibt es?
    answer: |

     Obwohl wir uns bemühen, eine vielfältige Auswahl anzubieten, können einige Optionen aufgrund lokaler Gegebenheiten begrenzt sein. Die geplanten Optionen umfassen:
      <ul>
      <li>
      glutenfrei</li><li>
      laktosefrei</li><li>
      Fleisch</li><li>
      vegan</li><li>
      vegetarisch</li>
      </ul>

      Alle Speisen werden mit Allergen-Kennzeichnung versehen.

      Wir werden vor der Konferenz eine repräsentative Umfrage durchführen, um eine angemessene Verteilung der Optionen sicherzustellen.
    display: true
    order: 7
  - id: what-if-one-gets-sick
    section: tickets
    question: Was passiert, wenn man kurz vor der Konferenz krank wird oder es einen Notfall gibt?
    answer: |
      Tickets können neu zugewiesen werden, bis zu zwei Tage vor der Konferenz.

      Alle Vor-Ort-Tickets **beinhalten Remote-Zugang**, sodass man bei Unwohlsein
      trotzdem remote teilnehmen kann.
    display: true
    order: 8
  - id: tickets-invoice-correction
    section: tickets
    question: Wie können Rechnungen korrigiert werden?
    answer: |
      Rechnungsdetails können im **Self-Service** über den Ticket-Shop aktualisiert werden.

      Bei Änderungen stellt das System automatisch eine **Gutschrift** für die Originalrechnung aus und erstellt eine **neue korrigierte Rechnung**.
    display: true
    order: 9
  - id: conference-t-shirts
    section: tickets
    question: Sind Konferenz-T-Shirts inbegriffen?
    answer: |
      Ein kostenloses Konferenz-T-Shirt ist bei 3-Tages-Tickets inbegriffen, verfügbar nur per **Vorbestellung**.
      Die Registrierung muss bis zum **25. März 2026** abgeschlossen sein, um ein T-Shirt zu erhalten.
      Vor der Bestellung die verfügbaren Größen überprüfen.
    link: /blog/t-shirt-sizes/
    link_display: T-Shirt-Größen
    display: true
    order: 999
  - id: what-is-the-right-ticket-to-buy
    section: tickets
    question: Welche Ticket-Kategorie sollte ausgewählt werden?
    answer: |
      Unternehmen, Organisationen und Freiberufler müssen **Standard-Tickets** kaufen — keine Ausnahmen.

      Um die Konferenz für alle zugänglich zu machen, wird eine begrenzte Anzahl vergünstigter Tickets angeboten, um Bildung, Forschung und Community-Engagement zu unterstützen.

      **Ermäßigte Tickets sind verfügbar für:**
      <ul>
      <li>
      Studenten mit gültigem Studentenausweis zum Zeitpunkt der Konferenz</li><li>
      Postdoktoranden (Post-Docs)</li><li>
      Akademische Forscher</li><li>
      Hobbyisten, Enthusiasten oder Personen, die die Sprache lernen</li>
      </ul>


      **Diese Kategorien gelten für Ticketing-Zwecke als Unternehmen oder Organisationen:**
      <ul>
      <li>
      Start-ups</li><li>
      Mitarbeiter des öffentlichen Sektors</li><li>
      Private Forschungsinstitute</li><li>
      Unternehmens-F&E-Abteilungen</li>
      </ul>


    display: true
    order: 10
  - id: do-you-offer-any-day-tickets
    section: tickets
    question: Werden Tages-Tickets angeboten?
    answer: |
      Ja. Eine begrenzte Anzahl von **Tages-Tickets** ist für die Öffentlichkeit verfügbar.
      Die Verfügbarkeit hängt vom Gesamtticketverkauf und der Veranstaltungskapazität ab.
    display: true
    order: 10
  - id: social-event-tickets
    section: tickets
    question: Social-Event-Tickets?
    answer: |
      Tickets für das Social Event können ab dem ersten Tag im Ticket-Shop als Zusatz zu jedem Vor-Ort-Konferenz-Ticket erworben werden.
      Hinweis: Die Plätze sind begrenzt. Für Tages-Tickets ist das Social Event nur mit einem Mittwoch-Tages-Ticket verfügbar.
      Die Tickets können von Ticketinhabern auch nachträglich bestellt werden. Dies löst eine Bestelländerung aus.
    display: true
    order: 10
  - id: tickets-for-students
    section: tickets
    question: Wie sieht es mit Tickets für Studenten aus?
    answer: |
      Ein ermäßigtes Studenten-Ticket ist für alle verfügbar, die zum Zeitpunkt der Konferenz einen gültigen Studentenausweis besitzen.
      Der Studentenausweis muss beim ersten Betreten der Veranstaltung vorgezeigt werden.

      Hinweis: Das ermäßigte Ticket ist nicht anwendbar, wenn der Studentenstatus vor der Konferenz endet.
    display: true
    order: 11
  - id: tickets-vat
    section: tickets
    question: Alle Ticketpreise verstehen sich inklusive MwSt.
    answer: |
      Alle Ticketpreise beinhalten 19% MwSt.

      Die EU-Umsatzsteuer-Umkehrung gilt **nicht**, da Konferenzen im Gastland besteuert werden.
      Unternehmen können eine MwSt.-Erstattung über die lokalen Steuerbehörden beantragen.
    display: true
    order: 11
  - id: order-limits
    section: tickets
    question: Bestelllimits
    answer: Einige Vor-Ort-Tickets können Bestelllimits pro Bestellung unterliegen.
    display: false
    order: 999
  - id: i-m-on-a-budget-and-cannot-afford-a-ticket
    section: tickets
    question: Ich habe ein begrenztes Budget und kann mir kein Ticket leisten.
    answer: |
      Die Konferenz bietet ein **Finanzhilfe- und Stipendienprogramm** zur Unterstützung derjenigen, die sonst nicht teilnehmen könnten.
      Die Programmseite enthält die diesjährigen Fristen und Details.
    link: /financial-aid/
    link_display: Finanzhilfeprogramm
    display: true
    order: 999
  - id: is-it-possible-to-purchase-individual-tickets-as-a-company
    section: tickets
    question: Kann ein Unternehmen Individual-Tickets kaufen?
    answer: |
      Nein. Ermäßigte **Individual-Tickets** sind ausschließlich für Privatpersonen bestimmt.
      Tickets, die von einem Unternehmen oder einer Organisation gekauft werden, werden storniert.
      Jeder Verweis auf ein Unternehmen oder eine Organisationsadresse in den Rechnungsdetails gilt als Missbrauch und führt ebenfalls zur Stornierung.
    display: true
    order: 999
  - id: i-m-working-with-python-but-i-do-not-get-reimbursed-by-my-employer
    section: tickets
    question: Ich arbeite mit Python, bekomme aber keine Erstattung von meinem Arbeitgeber.
    answer: |
      In diesem Fall ist es akzeptabel, ein **Individual-Ticket** zu kaufen.
      Wichtig: Es dürfen keine Unternehmens- oder Organisationsinformationen in den Rechnungsdetails enthalten sein, da dies als Missbrauch gilt und zur Stornierung führen kann.
    display: true
    order: 999
  - id: is-it-possible-to-purchase-student-tickets-as-a-company
    section: tickets
    question: Kann ein Unternehmen Studenten-Tickets kaufen?
    answer: Ja, ein gültiger Studentenausweis muss beim ersten Betreten der Konferenz vorgezeigt werden.
    display: true
    order: 999
  - id: i-m-an-academic-researcher-which-one-is-the-right-ticket-for-me
    section: tickets
    question: Ich bin akademischer Forscher — welches Ticket sollte ich wählen?
    answer: |
      Akademische Forscher, die **öffentlichen akademischen Einrichtungen** angehören — wie öffentlichen Universitäten oder Forschungsorganisationen wie den **Max-Planck-** oder **Helmholtz-Instituten** — sind berechtigt, ein **Individual-Ticket** zu kaufen.

      Diese Option ist **nicht verfügbar** für Forscher, die in **privaten Instituten**, **Forschungsunternehmen** oder im **öffentlichen Sektor** arbeiten.

      Hinweis: **Individual-Tickets** zeigen aus logistischen Gründen keine institutionellen Zugehörigkeiten auf Konferenz-Badges an.
      Wenn die Anzeige der Zugehörigkeit wichtig ist, empfiehlt sich stattdessen ein **Standard-Ticket**.
    display: true
    order: 999
  - id: my-credit-card-is-not-working-are-there-alternative-payment-methods
    section: tickets
    question: Meine Kreditkarte funktioniert nicht — gibt es alternative Zahlungsmethoden?
    answer: |
      Ja. Zusätzlich zu Kreditkartenzahlungen über **Stripe** können Tickets auch per **Banküberweisung** über den Ticket-Shop bezahlt werden.
      Beim Checkout die Banküberweisungsoption wählen.

      Alle Gelder müssen innerhalb von 10 Werktagen und **mindestens zwei Wochen vor der Konferenz** eingehen; unbezahlte Tickets werden automatisch storniert.

      Falls Probleme mit Kreditkartenzahlungen weiterhin bestehen, bitte die Bank kontaktieren oder es später erneut versuchen, da vorübergehende Autorisierungsprobleme auftreten können.

    display: true
    order: 999
  - id: where-can-i-find-the-invoice
    section: tickets
    question: Wo finde ich die Rechnung?
    answer: |
      Nach Abschluss des Kaufs werden alle relevanten Informationen und Dokumente, einschließlich der **Rechnung**, per E-Mail vom Ticket-Shop **Pretix** gesendet.
      Die Rechnungs-E-Mail enthält einen Link, über den die Rechnungsadresse hinzugefügt oder bearbeitet werden kann.

      Die Rechnungsadresse wird oft von Arbeitgebern benötigt, um die MwSt. geltend zu machen.
      Wichtig: Die korrekten Rechnungsdetails (z.B. Arbeitgeberinformationen) müssen **vor Beginn der Konferenz** eingegeben werden.
      Änderungen an Rechnungen können nach diesem Zeitraum nicht vorgenommen werden.
    display: true
    order: 999
  - id: reselling-tickets
    section: tickets
    question: Können Tickets weiterverkauft werden?
    answer: |
      Tickets sind **personalisiert** und **Weiterverkauf ist nicht gestattet**.
      Es ist jedoch akzeptabel, Tickets im Namen eines Freundes, Kollegen oder einer Tochtergesellschaft zu kaufen.
    display: true
    order: 999
  - id: do-you-sell-tickets-at-the-conference
    section: tickets
    question: Werden Tickets auf der Konferenz verkauft?
    answer: Nein.
    display: false
    order: 999
  - id: are-badges-transferable
    section: tickets
    question: Sind Badges übertragbar?
    answer: |
      Nein, Badges sind nur für die Person gültig, die die Badges ausgestellt wurde.
    display: true
    order: 999
  - id: do-you-have-extra-discounted-tickets-for-sponsors
    section: tickets
    question: Gibt es zusätzliche ermäßigte Tickets für Sponsoren?
    answer: Ja, bitte das Sponsoring kontaktieren.
    link: /sponsoring/
    link_display: Link zum Sponsoring
    display: true
    order: 999
  - id: return-ticket
    section: tickets
    question: Wie kann ein Ticket zurückgegeben oder storniert werden?
    answer: |
      Tickets können bis zum **27. März 2026** direkt über den Ticket-Shop mit der Self-Service-Option in der Bestätigungs-E-Mail storniert werden.
      Dazu dem Link in dieser E-Mail folgen, um das Ticket zu verwalten oder zu stornieren.

      Falls Unterstützung benötigt wird, kann das unten stehende Kontaktformular verwendet werden. Den vollständigen Namen und die Ticketnummer (z.B. TCK5-1) angeben.
      Erstattungen werden ausschließlich über die ursprünglich verwendete Zahlungsmethode vorgenommen.

      Rückerstattungen sind kostenlos, sofern sie auf Kreditkarte, PayPal und SEPA-Konten (EUR-Konto im europäischen Zahlungsraum) erfolgen. Bei internationalen Überweisungen (SWIFT) werden die anfallenden Bankgebühren von der Rückerstattung abgezogen.
    link: '#contact'
    link_display: Kontaktformular
    display: true
    order: 999
  - id: rueckgabe-social-event-ticket
    section: tickets
    question: Ich möchte nur mein Social-Event-Ticket stornieren, aber mein Konferenzticket behalten.
    answer: |
      Social-Event-Tickets können nicht direkt im Ticketshop storniert werden.
      Bitte das Kontaktformular nutzen — die Stornierung und Erstattung des Tickets erfolgt gerne bis zum 27. März.
    link: '#contact'
    link_display: Kontaktformular
    display: true
    order: 999
  - id: badge-info
    section: tickets
    question: Wie können Informationen auf Konferenz-Badges aktualisiert werden?
    answer: |
      Badge-Informationen werden direkt aus den über **Pretix Ticket-Shop** bereitgestellten Details übernommen.

      Alle Aktualisierungen müssen im Tickets-Shop Pretix vorgenommen werden, indem den Links in den Ticket-Bestätigungs-E-Mails gefolgt wird.

      Die folgenden Informationen können aktualisiert werden:
      <ol>
        <li>Name</li>
        <li>Firmenname</li>
        <li>E-Mail</li>
      </ol>

      Wichtig: Die E-Mail-Adresse des Tickets muss für die betreffende Person direkt zugänglich sein, da wichtige Informationen zur Konferenz direkt an die Teilnehmenden versendet werden. Für die Bestellung kann jede beliebige E-Mail-Adresse verwendet werden.

      Bei mehreren Ticketkäufen müssen alle Teilnehmer ihre Informationen zeitnah eingeben.

      Badges werden im Voraus gedruckt, sodass nach der angegebenen Frist vorgenommene Änderungen nicht berücksichtigt werden.
    display: false
    order: 999
  - id: certificate-of-attendance
    section: tickets
    question: Werden Teilnahmebescheinigungen für Teilnehmer ausgestellt?
    answer: Ja, Teilnahmebescheinigungen werden ausgestellt. Diese werden nach der
      Konferenz per E-Mail verschickt.
    display: true
    order: 999