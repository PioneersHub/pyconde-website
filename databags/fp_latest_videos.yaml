# ──────────────────────────────────────────────────────────────
# Front-page Latest Videos section
# ──────────────────────────────────────────────────────────────#
# Surfaces the most recently published past-conference recordings
# on the front page. The macro (templates/macros/latest-videos.html)
# walks the current /talks + every /archive/{year}/talks, keeps
# talks with a youtube_id + video_published_at (not do_not_record),
# sorts by video_published_at descending, and renders `count` cards.
#
# No per-video curation needed — it auto-refreshes as
# utils/sync_recordings.py attaches new recordings.
# ──────────────────────────────────────────────────────────────

