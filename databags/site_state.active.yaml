# ──────────────────────────────────────────────────────────────
# Site state — ACTIVE (pre/during conference)
# ──────────────────────────────────────────────────────────────
#
# Copied to databags/site_state.yaml by `make activate-conference`.
# This is the single source of truth the archive funnel-CTA macro
# (templates/macros/funnel-cta.html) reads to decide whether the
# "tickets on sale" module shows on the 700 archive pages.
#
# Do NOT edit databags/site_state.yaml directly — edit this preset
# and re-run the switch.
# ──────────────────────────────────────────────────────────────

mode: active
year: 2027

# Funnel CTA shown on every archive talk / speaker / track / edition page.
# Keep it short and date-anchored. Empty headline hides the module.
headline: "PyCon DE & PyData 2027 — tickets on sale"
sub: "Returns to the darmstadtium, Darmstadt, 14–16 April 2027."
tickets_url: /buy-ticket/
tickets_label: "Get your ticket"
early_bird_until: "10 February 2027"
