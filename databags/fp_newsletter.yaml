display: true
# Newsletter CTA section
#
# Two variants share this databag:
#  - Footer band (templates/macros/newsletter.html) used on landing pages.
#  - Inline capture (templates/macros/newsletter-inline.html) used on
#    archive surfaces (talk / track / speaker / search) so a transcript
#    reader has a one-click path to subscribe. Content-framed, not a
#    hard sell.
#
# The inline macro falls back to the footer copy when the inline_*
# fields are absent, so editing just the top four keys still updates
# both surfaces.
title: "Stay in the Loop"
body: "Get speaker announcements, schedule updates, and early-bird offers straight to your inbox."
link_text: "Subscribe to Newsletter"
link_url: /newsletter/

# Inline variant (archive surfaces)
inline_title: "Get the next drops in your inbox"
inline_body: "New 2026 video + transcript releases and the 2027 programme, as they land. One email when there's something worth watching."
inline_link_text: "Subscribe"
