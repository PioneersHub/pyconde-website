# ──────────────────────────────────────────────────────────────
# Current-conference state (single, always-on)
# ──────────────────────────────────────────────────────────────#
# The site has one always-conference front page (no recap mode),
# so there is no active/inactive switch. This file holds the
# current-conference context read by the archive funnel-CTA
# (templates/macros/funnel-cta.html) on talk / track / speaker /
# archive-edition / topic-hub pages: a persistent "tickets on sale"
# band pointing archive traffic at the current conference.
#
# The funnel-CTA renders whenever `headline` is non-empty; clear it
# to hide the band (e.g. between cycles before the next dates lock).
# ──────────────────────────────────────────────────────────────

