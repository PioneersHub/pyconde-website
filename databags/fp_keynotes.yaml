display: true
# ──────────────────────────────────────────────────────────────
# Keynote reveal teaser (active homepage)
# ──────────────────────────────────────────────────────────────#
# Drives templates/macros/keynote-teaser.html on the active landing
# page. Each staggered keynote reveal is a one-field flip here
# (`revealed: false` -> `true`) + a rebuild — the keynote page
# itself (content/keynote-*) remains the durable, ranked asset and
# the source of truth for speaker name / role / image / Person
# JSON-LD (emitted in templates/keynote.html).
#
# The macro resolves each `page` via site.get(...) at render time,
# so speaker details are never duplicated here. Unrevealed keynotes
# never appear on the page. The band self-hides when nothing is
# revealed yet.
#
# Sequence reveals to the pricing calendar (per
# WEBSITE-STRATEGY-2027 §5): one around Early-Bird open, one around
# Late-Bird start, one near schedule publish.
# ──────────────────────────────────────────────────────────────

keynotes:
  - page: /keynote-hilde-kuehne/
    reveal_date: "2027-02-11"
    revealed: false
  - page: /keynote-sebastian-raschka/
    reveal_date: "2027-03-11"
    revealed: false

# Example — on reveal day, edit to:
#   - page: /keynote-hilde-kuehne/
#     reveal_date: "2027-02-11"
#     revealed: true
