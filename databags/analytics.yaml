# ──────────────────────────────────────────────────────────────
# Analytics & retargeting pixels
# ──────────────────────────────────────────────────────────────#
# Injected into <head> by templates/macros/analytics-head.html,
# included from templates/layout.html so every page (archive +
# landing) carries the tags. Fires only when databags/seo.yaml
# `env: production` — local dev stays pixel-free.
#
# Per-provider `enabled` flag lets you turn a channel on/off
# independently. Leave ids empty until the pixel is provisioned;
# an empty id self-hides that provider's snippet.
#
# A pixel added in November has no audience by December — wire the
# include now, flip enabled + id when the tag is ready.
# ──────────────────────────────────────────────────────────────

enabled: false

meta:
  enabled: false
  pixel_id: ""        # e.g. "123456789012345"

linkedin:
  enabled: false
  partner_id: ""      # e.g. "1234567"

google:
  enabled: false
  measurement_id: ""  # e.g. "G-XXXXXXX"
