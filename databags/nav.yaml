# ──────────────────────────────────────────────────────────────
# Top-nav chrome toggles
# ──────────────────────────────────────────────────────────────#
# Gates the hardcoded top-nav elements in templates/layout.html
# that are not driven by databags/links.yaml:
#   show_search       – the search icon (top-right)
#   show_tickets_cta  – the "Get Tickets" button (top-right)
#
# Both default to true when this file or the key is absent, so other
# editions are unaffected. For the 2027 launch the nav is stripped to
# Archive + must-haves, so both are off.
# ──────────────────────────────────────────────────────────────

show_search: true
show_tickets_cta: true
