# Site navigation links.
#
# Each entry:
#   name    – link label (or separator label when `path` is empty)
#   path    – internal path or external URL; empty → sidebar separator
#   topnav  – true → also render in the desktop top bar
#   type    – `external` → skip the |url filter on `path`
#   target  – e.g. `_blank` for external links
#   display – true/false; false hides the entry from topnav, sidebar,
#             and footer-nav (defaults to true when absent)
#   footer  – true/false; false keeps the entry out of the footer nav
#             while leaving topnav/sidebar untouched (defaults to true)
#
# For the 2027 launch the nav is stripped to Archive + must-haves
# (Imprint, Privacy Policy, Contact). Set `display: true` on an entry
# to bring it back. Footer social icons, the archive editions list,
# and the Code of Conduct link are hardcoded in layout.html.

pages:
- name: Tickets
  path: /buy-ticket/
  topnav: false
  display: false
- name: Talks
  path: /talks/
  topnav: true
  display: false
- name: Speakers
  path: /speakers/
  topnav: true
  display: false
- name: Past editions
  path: /archive/
  topnav: true
  display: true
  # The footer already has the past-editions year band (layout.html);
  # keep this link out of the footer nav so it appears there only once.
  footer: false
- name: Search
  path: /search/
  topnav: false
  display: false
- name: Schedule
  path: https://pretalx.com/pyconde-pydata-2027/schedule/
  target: _blank
  type: external
  topnav: true
  display: false
- name: Masterclasses
  path: /masterclasses/
  topnav: true
  display: false
