# ──────────────────────────────────────────────────────────────
# Programme status band (active homepage)
# ──────────────────────────────────────────────────────────────#
# Replaces the dead section_4 "507 proposals" slot that the active
# landing template never rendered. Wired into landing-page-active.html
# via templates/macros/programme-status.html.
#
# Each staggered reveal / milestone is a one-field flip here + a
# rebuild — no template edit. The macro self-hides when `status` is
# empty, so the band can be retired between beats.
#
# status values: cfp-open | voting | accepted | schedule | live | (empty)
# ──────────────────────────────────────────────────────────────

# Empty by default so the band stays hidden until the cycle opens
# (the live site is in RECAP/inactive mode and doesn't render this
# template at all right now anyway). Set on Nov 19 launch.
status: ""

headline: ""
sub: ""
count_label: ""
count_value: ""
cta_label: ""
cta_url: ""

