# ──────────────────────────────────────────────────────────────
# Cross-edition topic hubs
# ──────────────────────────────────────────────────────────────#
# Standing collection pages that aggregate talks across ALL
# editions (2016→current) by topic — the head-term SEO play that
# needs zero program data. `make topic-hubs` reads this list and
# runs utils/generate_topic_hubs.py to emit content/topics/<slug>/.
#
# This file holds ONLY the hub definitions. The front-page topic
# pills live in databags/frontpage/sections/topics.yaml.
#
# A talk matches a hub if any `keywords` substring appears in its
# title or abstract (case-insensitive) OR its `track` label
# contains any of `tracks`. Add a hub by appending here + rerunning
# `make topic-hubs` — no template edit.
# ──────────────────────────────────────────────────────────────

hubs:
  - slug: llms-and-agents
    title: "LLMs & Agents at PyCon DE & PyData"
    section_title: "LLMs & Agents"
    description: "Large language models, agents, RAG, and applied AI across every edition."
    matchers:
      keywords:
        - llm
        - large language model
        - language model
        - agent
        - agents
        - agentic
        - rag
        - retrieval-augmented
        - prompt
        - gpt
        - fine-tun
        - embedding
      tracks:
        - AI
        - Machine Learning
        - LLM

  - slug: mlops
    title: "MLOps & Deployment at PyCon DE & PyData"
    section_title: "MLOps"
    description: "Shipping, monitoring, and operating ML systems in production."
    matchers:
      keywords:
        - mlops
        - deployment
        - kubernetes
        - docker
        - ci/cd
        - pipeline
        - observability
        - inference
        - serving
        - model registry
      tracks:
        - MLOps
        - DevOps
        - Infrastructure

  - slug: polars-and-pandas
    title: "Polars & pandas at PyCon DE & PyData"
    section_title: "Polars & pandas"
    description: "Dataframes, data engineering, and the Polars/pandas ecosystem."
    matchers:
      keywords:
        - polars
        - pandas
        - dataframe
        - data engineering
        - etl
        - pyarrow
        - duckdb
      tracks:
        - Data Engineering
        - PyData
