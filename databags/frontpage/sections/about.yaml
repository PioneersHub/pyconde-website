title: "We Get Things Done: Together"

body: |
  The leading conference for applied AI and open source.

  PyCon DE brings together a mature, welcoming community from research and industry: engineers, data scientists, startup founders, team leaders, VCs, and forward-thinking CIOs and CTOs who want genuine insight into what works, what does not, and what lies beyond the hype.

  PyCon DE is a catalyst for innovation—a place where hard-won lessons, bold ideas, and emerging practices are shared early, tested through conversation, and cross-pollinated into what comes next.

  Every session is selected by peers who understand the field. That means real insights, honest lessons learned, and practical takeaways from real-world applications and use cases.

  In 2027, we are taking the conference to the next level, with more sprints, hackathons, satellite events, and more opportunities to connect.

  Be part of it.

  This is where engineering and applied AI with open source move forward—and where you move forward with them.

  Whether you are a beginner or an expert, you belong here.


