display: true
# ──────────────────────────────────────────────────────────────
# Front-page Topics — pill/tag grid
# ──────────────────────────────────────────────────────────────#
# Renders conference topics as colored pills on the front page,
# answering "Is this conference relevant to what I'm working on?"
#
# To add/remove/reorder → edit this file only. No template changes.
#
# Fields:
#   text  – topic label (short, scannable)
#   color – CSS color variable name from site palette
#
# Note: cross-edition topic HUB pages are defined separately in
# databags/topics.yaml (read by utils/generate_topic_hubs.py).
# ──────────────────────────────────────────────────────────────

section_title: "What People Are Talking About"

topics:
  - text: "AI Agents & Automation"
    color: "blue"
  - text: "LLMs & Generative AI"
    color: "pink"
  - text: "Data Engineering"
    color: "green"
  - text: "Python Performance"
    color: "orange"
  - text: "MLOps & Deployment"
    color: "red"
  - text: "Testing & Quality"
    color: "blue-light"
  - text: "Security & Privacy"
    color: "yellow"
  - text: "Open Source Tooling"
    color: "green"
  - text: "Responsible AI"
    color: "pink"
  - text: "Developer Experience"
    color: "blue"
