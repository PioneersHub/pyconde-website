display: true
# ──────────────────────────────────────────────────────────────
# Past Editions block — homepage + landing-page section
# ──────────────────────────────────────────────────────────────
#
# Promotes past editions from the homepage so visitors see at a
# glance how deep the conference history reaches. Each entry
# renders as a compact "year | place" row. Edit this file when a
# new edition is archived.
#
# archive_ready — the talk/speaker archive under /archive/{year}/
#   is not fully migrated yet. While false:
#     - each row links to the edition's original conference site
#       (`site`, opens in a new window) instead of `path`
#     - the "Browse the full archive" button is hidden
#     - editions without a `site` (2016) render unlinked
#   Flip to true once the archive is deployed.
# ──────────────────────────────────────────────────────────────

archive_ready: false

section_label: Explore past editions
heading: Explore past editions
subheading: >
  A decade of community-driven Python and data conferences. Browse
  every talk, every speaker, every recording — searchable, citable,
  permanently archived.

editions:
  - year: 2026
    path: /archive/2026/
    site: https://2026.pycon.de/
    location: darmstadtium, Darmstadt
  - year: 2025
    path: /archive/2025/
    site: https://2025.pycon.de/
    location: darmstadtium, Darmstadt
  - year: 2024
    path: /archive/2024/
    site: https://2024.pycon.de/
    location: bcc Berlin
  - year: 2023
    path: /archive/2023/
    site: https://2023.pycon.de/
    location: bcc Berlin
  - year: 2022
    path: /archive/2022/
    site: https://2022.pycon.de/
    location: bcc Berlin
  - year: 2019
    path: /archive/2019/
