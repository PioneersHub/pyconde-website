# Tickets CTA section
#
# Kept in sync with databags/tickets.yaml by `make flip-pricing`
# (utils/flip_pricing.py). Do not hand-edit the pricing fields
# (period / price_label / strike_price) — edit tickets.yaml tiers
# and run the flipper.
#
# title     – section heading
# body      – short description paragraph
# price_label – active price line (e.g. "from €690")
# strike_price – struck-through anchor price; in the early period
#                this is the future late price (loss-framing); empty
#                in the late period (the regret anchor is dropped).
# link_text – button label
# link_url  – button destination

title: "Tickets"
body: >
  PyCon DE & PyData sells out — every single year.
  Secure your spot for three days of talks, workshops,
  and community — plus sprints and masterclasses.
period: early
price_label: "from €690"
strike_price: "€890"
link_text: "Get your ticket"
link_url: /buy-ticket/
