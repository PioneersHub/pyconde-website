# ──────────────────────────────────────────────────────────────
# Front page — section order + display
# ──────────────────────────────────────────────────────────────#
# The single place to manage which sections appear on the front
# page and in what order. Each entry:
#   id      — stable key; maps to databags/fp_<id>.yaml (texts)
#             and a branch in templates/macros/homepage.html.
#   display — true/false; set false to drop the section from the
#             page without editing templates.
#
# To reorder: move the line. To hide: display: false.
#
# A section renders iff this `display` is true AND the matching
# databags/fp_<id>.yaml has `display` != false (both default true).
#
# 2027 launch: only the focus sections are visible (intro, keydates,
# latest_videos, latest_blog, newsletter, sponsoring_newsletter).
# Toggle the others on as the cycle progresses.
# ──────────────────────────────────────────────────────────────

sections:
  - id: intro
    display: true
  - id: motto
    display: false
  - id: programme_status
    display: false
  - id: keydates
    display: false
  - id: topics
    display: false
  - id: keynotes
    display: false
  - id: featured
    display: false
  - id: masterclasses
    display: false
  - id: why_attend
    display: false
  - id: stats
    display: false
  - id: community
    display: false
  - id: past_editions
    display: false
  - id: latest_videos
    display: true
  - id: tickets
    display: false
  - id: sponsors
    display: false
  - id: sponsoring
    display: false
  - id: newsletter
    display: true
  - id: latest_blog
    display: true
  - id: sponsoring_newsletter
    display: true
