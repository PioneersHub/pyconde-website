# ──────────────────────────────────────────────────────────────
# Brand strings & site-wide identity
# ──────────────────────────────────────────────────────────────
#
# Single source of truth for the conference claim, meta-descriptions,
# location, dates, and social-profile URLs.
# Templates read these via bag('branding')['key'].
#
# Edit this file to update messaging across all pages — no template
# changes required. Stays consistent across English and German contexts.
# ──────────────────────────────────────────────────────────────

claim:
  en: The largest conference for applied AI with Open Source
  de: Die größte Konferenz für angewandte KI mit Open Source

# Title-Suffix appended to every page title (homepage exempt — see layout.html).
title_suffix:
  en: " — PyCon DE 2027"
  de: " — PyCon DE 2027"

# Default <meta name="description"> + og:description when the page model has no `description`.
# Targets ~150–160 chars and includes claim + dates + venue for snippet quality.
default_description:
  en: "PyCon DE 2027 — the largest conference for applied AI with Open Source. 20–22 April, HCC Heidelberg. Masterclasses 19 April, Sprints 23–24 April."
  de: "PyCon DE 2027 — die größte Konferenz für angewandte KI mit Open Source. 20.–22. April, HCC Heidelberg. Masterclasses am 19. April, Sprints am 23.–24. April."

location:
  city: Heidelberg
  venue: HCC Heidelberg
  country: DE
  region: Baden-Württemberg
  # TODO: confirm HCC Heidelberg street address + postal code for JSON-LD.
  address: "HCC Heidelberg, Heidelberg"

dates:
  conference: "20 April – 22 April 2027"
  masterclasses: "19 April 2027"
  sprints: "23 April – 24 April 2027"
  start_iso: "2027-04-20"
  end_iso: "2027-04-22"
  # ISO-8601 timezone offset of the venue. Used to build full Event
  # startDate / endDate values for schema.org. Hardcoded to CEST because
  # the conference is always in April. Update when the venue or month
  # changes.
  tz_offset: "+02:00"

canonical_host: https://pycon.de

organization:
  name: Python Software Verband e.V.
  url: https://python-verband.org

social:
  twitter_handle: "@pyconde"
  twitter_url: https://x.com/PyConDE
  linkedin_url: https://www.linkedin.com/company/pyconde-pydata-berlin
  mastodon_url: https://fosstodon.org/@pyconde
  github_url: https://github.com/PYCONDE
  youtube_pyconde: https://www.youtube.com/@PyConDE
  youtube_pydata: https://www.youtube.com/@PyDataTV

theme_color: "#00c8e1"
