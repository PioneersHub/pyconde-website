sections:
- name: Media Kit
  id: mediakit
  order: 1
  display: true
  qa:
  - id: mediakit-contents
    section: mediakit
    question: What is included in the media kit?
    answer:
    - "The ZIP archive contains PyCon DE & PyData logos in various formats, Python illustrations, and ready-made example templates for speakers, sponsors, and volunteers."
    - "The brand manual (PDF) explains how to use these assets correctly."
    display: true
    order: 1

  - id: mediakit-brand-colors
    section: mediakit
    question: What are the official brand colors?
    answer:
    - "PyCon DE & PyData 2026 uses seven brand colors:"
    - "Silver (#b7bcbf), Orange (#ff9b00), Yellow (#fac800), Light Green (#96dc00), Light Blue (#00c8e1), Dark Blue (#3778be), Dark Green (#00aa41)."
    - "The brand manual includes both sRGB and ISO coated v2 (CMYK) values for each color."
    display: true
    order: 2

  - id: mediakit-font
    section: mediakit
    question: What font does PyCon DE use?
    answer: "The official typeface is Helvetica, used in both Bold and Regular weights."
    display: true
    order: 3

  - id: mediakit-logo-clearspace
    section: mediakit
    question: How much clear space should I leave around the logo?
    answer: "Leave at least the height of the logo as clear space on all four sides. This ensures the logo remains legible and uncluttered."
    display: true
    order: 4

  - id: mediakit-color-contrast
    section: mediakit
    question: Can I use any color combination for text on colored backgrounds?
    answer:
    - "No. Not all color combinations provide sufficient contrast for readability."
    - "The brand manual includes a contrast matrix showing which combinations work well and which to avoid. Please check it before choosing text and background colors."
    display: true
    order: 5

  - id: mediakit-contact
    section: mediakit
    question: Who do I contact for questions about the media kit?
    answer: "If you have questions about the media kit or need custom assets, please reach out via our contact page."
    link: /contact/
    link_display: Contact us
    display: true
    order: 6
