<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  {# A direct hit on /certificates-validate/ or /certificates-share/
     carries no useful content — only the per-id child pages do.
     Hard-redirect to the homepage to keep the URL pattern from being
     a discoverable surface for guessing or scraping. #}
  <meta http-equiv="refresh" content="0; URL='/'">
  <link rel="canonical" href="https://2026.pycon.de/">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <script>
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting to <a href="/">the homepage</a>.</p>
</body>
</html>
