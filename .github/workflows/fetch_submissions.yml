name: Fetch submissions

# ---------------------------------------------------------------------------
# TRIGGER POLICY — DO NOT ADD `push:` TO THIS WORKFLOW.
#
# This workflow auto-commits Pretalx data back into the repo and must only
# run on the scheduled cron (and optionally workflow_dispatch for manual
# reruns). Wiring it to `push:` would cause every commit to main to hit the
# Pretalx API and race with the deploy in main.yml.
#
# Scheduled cron is disabled until PyCon 2027 — uncomment the two
# `schedule:` lines below to re-enable daily auto-fetching. `workflow_dispatch`
# is kept active so the workflow remains schema-valid and so maintainers can
# trigger a manual run from the Actions UI in the meantime.
# ---------------------------------------------------------------------------
on:
  # schedule:
  # - cron: "0 0 * * *"  # runs once per day at midnight
  workflow_dispatch:

jobs:
  fetch_submissions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Setting up python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install project
        run: uv sync --locked --all-extras
      - name: Run submissions fetcher
        run: make fetch-submissions
        env:
          PRETALX_API_KEY: ${{ secrets.PRETALX_API_KEY }}
          PRETALX_EVENT_NAME: ${{ secrets.PRETALX_EVENT_NAME }}
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fetches submissions and updates talk pages
