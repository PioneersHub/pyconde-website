[model]
name = Keynote
label = {{ this.speaker_name }}: {{ this.title }}
hidden = no

[fields.title]
type = string
label = Keynote Title

[fields.speaker_name]
type = string
label = Speaker Name

[fields.speaker_role]
type = string
label = Speaker Role / Affiliation

[fields.speaker_image]
type = string
label = Hero portrait filename (in /static/media/keynotes/)

[fields.description]
type = string
label = SEO/social teaser (max 160 chars)

[fields.social_card_image]
type = string
label = Social Card Image (path relative to content dir, e.g. /keynote-name/social_card.png)

[fields.pub_date]
type = date
label = Publication Date

[fields.body]
type = markdown
label = Full article body (supports inline HTML, images, video embeds)
