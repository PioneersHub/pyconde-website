[model]
name = Speaker
label = {{ this.name }}
hidden = yes

[fields.code]
label = Pretalx Speaker Code
type = string

[fields.name]
label = Full Name
type = string

[fields.slug]
label = URL Slug (derived from name)
type = string

[fields.biography]
label = Biography (verbatim Pretalx text, prefixed with framing line if first-person)
type = markdown

[fields.avatar]
label = Avatar filename (under /static/media/speakers/)
type = string

[fields.pronouns]
label = Pronouns (display only)
description = Speaker's self-described pronouns; informational, not used to rewrite the bio.
type = string

[fields.country]
label = Country of residence
type = string

[fields.city]
label = City of residence
type = string

[fields.company]
label = Company / Institute
type = string

[fields.job_title]
label = Position / Job title
type = string

[fields.homepage]
label = Personal homepage
type = url

[fields.linkedin]
label = LinkedIn URL
type = url

[fields.github]
label = GitHub URL
type = url

[fields.mastodon]
label = Mastodon URL / handle
type = string

[fields.threads]
label = Threads URL / handle
type = string

[fields.bluesky]
label = Bluesky URL / handle
type = string

[fields.twitter]
label = X / Twitter URL / handle
type = string

[fields.is_first_time_speaker]
label = First-time speaker at this edition
type = boolean

[fields.talks]
label = Pretalx talk codes presented at this edition
type = strings

[fields.inactive_reason]
label = Stub reason (none|insufficient_data); triggers noindex when set.
type = string
