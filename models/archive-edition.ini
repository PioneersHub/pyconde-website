[model]
name = Archive Edition
label = {{ this.title }}
hidden = yes

[fields.title]
label = Title
type = string

[fields.year]
label = Edition Year
type = integer

[fields.date_from]
label = Start Date
type = date

[fields.date_to]
label = End Date
type = date

[fields.location]
label = Location
type = string
description = e.g. "darmstadtium, Darmstadt" or "bcc Berlin"

[fields.pretalx_slug]
label = Pretalx Event Slug
type = string

[fields.talk_count]
label = Confirmed Talks
type = integer

[fields.recording_count]
label = Recordings Available
type = integer

[fields.body]
label = Body
type = markdown
