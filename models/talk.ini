[model]
name = Talk
label = {{ this.title }}
hidden = yes

[fields.title]
label = Title
type = string

[fields.description]
label = Short description (meta)
description = Plain-text snippet (~155 chars) generated from abstract by the importer for <meta name="description"> and og:description.
type = string

[fields.speaker_names]
label = Speaker Names
type = string

[fields.speakers]
label = Full Information About All Speakers
type = markdown

[fields.created]
label = Submission Date
type = date

[fields.abstract]
label = Abstract
type = text

[fields.full_description]
label = Full Description
type = markdown

[fields.code]
label = Code
type = string

[fields.social_card_image]
label = Social Card Image
type = string

[fields.submission_type]
label = Submission Type (slug)
description = Stable slug from databags/pretalx.yaml.submission_type_ids (keynote/talk_short/talk_long/tutorial/panel/lightning/sponsored/invited_talk/plenary/open_space/etc.).
type = string

[fields.submission_type_label]
label = Submission Type Display Label
description = Human-readable label resolved from databags/pretalx.yaml.submission_type_labels.
type = string

[fields.submission_type_id]
label = Submission Type Id (raw Pretalx)
type = string

[fields.is_keynote]
label = Is Keynote
type = boolean

[fields.python_skill]
label = Python Skill Level
type = string

[fields.domain_expertise]
label = Domain Expertise Level
type = string

[fields.track]
label = Track
type = string

[fields.tags]
label = Tags / Keywords (Pretalx submission tags)
type = strings

[fields.slot_date]
label = Slot Date (ISO yyyy-mm-dd)
description = ISO date of the talk's scheduled slot; used in <time datetime> and JSON-LD.
type = string

[fields.start_time]
label = Start Time
type = string

[fields.end_time]
label = End Time
type = string

[fields.duration]
label = Pretalx Scheduled Duration (informational)
description = Scheduled minutes per Pretalx. Actual recording length comes from YouTube and is stored in video_duration_iso.
type = string

[fields.slot_id]
label = Pretalx Slot Id
type = string

[fields.room]
label = Room
type = string

[fields.day]
label = Day
type = text

[fields.do_not_record]
label = Do Not Record
description = Speaker has opted out of recording. Template must suppress video embed and transcript display when true.
type = boolean

[fields.streaming_consent]
label = Streaming Consent
description = Pretalx 2026 boolean — explicit consent to streaming and recording.
type = boolean

[fields.already_recorded]
label = Already Recorded Elsewhere
description = Pretalx flag that this proposal was previously presented and recorded. Useful to avoid duplicating an existing public recording.
type = boolean

[fields.supporting_material_url]
label = Public Supporting Material URL
description = Author-provided link to videos / GitHub / etc. (Pretalx submission answer).
type = url

[fields.slides_link]
label = Slides URL
description = Author-provided slides link (Pretalx submission answer).
type = url

[fields.youtube_id]
label = YouTube Video Id
type = string

[fields.video_link]
label = YouTube Video Link
type = string

[fields.video_published_at]
label = YouTube Upload Date (ISO)
type = string

[fields.video_duration_iso]
label = YouTube Video Duration (ISO 8601)
description = e.g. PT42M17S — sourced from the YouTube Data API, used for VideoObject.duration.
type = string

[fields.video_thumbnail]
label = YouTube Thumbnail URL
type = string

[fields.recording_available]
label = Recording Available
description = Convenience flag set by the YouTube sync when a video has been linked.
type = boolean

[fields.transcript]
label = Transcript (markdown body)
description = Inline transcript body. Populated by utils/import_transcripts.py from speaker-diarized markdown.
type = markdown

[fields.transcript_status]
label = Transcript Status
type = select
choices = none, auto, reviewed, official
default = none

[fields.transcript_language]
label = Transcript Language
type = string
default = en
